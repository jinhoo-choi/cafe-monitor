name: 네이버 카페 부정여론 모니터링

on:
  workflow_dispatch:          # cron-job.org 또는 수동 실행

permissions:
  contents: write

concurrency:
  group: naver-cafe-monitor
  cancel-in-progress: false   # 실행 중 작업 강제 종료 방지 (DB 안전)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # 무한 루프 / 블로킹 방지

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 네이버 쿠키 복원
        run: |
          cat > naver_cookies.json <<'EOF'
          ${{ secrets.NAVER_COOKIES_JSON }}
          EOF

      - name: 모니터링 실행
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:   ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          EMAIL_CC:       ${{ secrets.EMAIL_CC }}
        run: python monitor.py

      - name: DB 변경사항 커밋
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_posts.json || true
          git diff --cached --quiet || git commit -m "update seen_posts.json"
          git pull --rebase origin main && git push origin main || echo "push 실패 - 다음 실행에서 재시도"

      # ── 디버그 분석 스텝 (debug_analyzer.py 존재 시에만 실행) ──────
      # monitor.py에 [DEBUG] 로그가 있는 동안 하루 1회 자동 수정 시도
      # 수정 완료 후 debug_analyzer.py는 workflow에서 제거됨
      - name: 디버그 로그 분석 및 자동 수정
        if: always()
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:   ${{ secrets.GMAIL_APP_PW }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f debug_analyzer.py ]; then
            echo "debug_analyzer.py 발견 - 실행"
            python debug_analyzer.py
          else
            echo "debug_analyzer.py 없음 - 스킵"
          fi

      # ── 패치 검증 스텝 (verify_patch.py 존재 시에만 실행) ──────────
      # debug_analyzer 실행 다음날 패치 효과 자동 검증
      - name: 패치 효과 검증
        if: always()
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:   ${{ secrets.GMAIL_APP_PW }}
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f verify_patch.py ]; then
            echo "verify_patch.py 발견 - 실행"
            python verify_patch.py
          else
            echo "verify_patch.py 없음 - 스킵"
          fi
