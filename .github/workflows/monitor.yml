name: 네이버 카페 부정여론 모니터링

on:
  schedule:
    - cron: '7 * * * *'     # UTC 매시 7분 = KST 매시 16분
  workflow_dispatch:          # 수동 실행 가능

permissions:
  contents: write

concurrency:
  group: naver-cafe-monitor
  cancel-in-progress: true    # 동시 실행 시 이전 작업 취소 (DB 충돌 방지)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15       # 무한 루프 / 블로킹 방지

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 네이버 쿠키 복원
        run: |
          cat > naver_cookies.json <<'EOF'
          ${{ secrets.NAVER_COOKIES_JSON }}
          EOF

      - name: 모니터링 실행
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:   ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python monitor.py

      - name: DB 변경사항 커밋
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_posts.db || true
          git diff --cached --quiet || git commit -m "update seen_posts.db"
          git pull --rebase || true
          git push || true

